 *
 * ZMK Studio Lighting (RGB Underglow) RPC Subsystem
 *
 * This proto defines the RPC messages for controlling RGB underglow lighting
 * via ZMK Studio, similar to how VIA/VIAL allows changing RGB settings.
 *
 * Subsystem field tag in studio.proto: 6 (lighting)
 */

syntax = "proto3";

package zmk.lighting;

// ============================================================================
//  Top-level RPC envelope (nested inside studio.Request / Response / Notification)
// ============================================================================

message Request {
    oneof request_type {
        bool              get_state       = 1;  // Get full RGB state
        SetPowerRequest   set_power       = 2;  // Turn RGB on/off
        SetEffectRequest  set_effect      = 3;  // Select effect by index
        SetColorRequest   set_color       = 4;  // Set HSB color
        SetSpeedRequest   set_speed       = 5;  // Set animation speed
        SetBrightness     set_brightness  = 6;  // Set brightness independently
        bool              list_effects    = 7;  // List available effect names
        bool              save_state      = 8;  // Persist current state to flash
    }
}

message Response {
    oneof response_type {
        LightingState           get_state       = 1;
        SetPowerResponse        set_power       = 2;
        SetEffectResponse       set_effect      = 3;
        SetColorResponse        set_color       = 4;
        SetSpeedResponse        set_speed       = 5;
        SetBrightnessResponse   set_brightness  = 6;
        EffectList              list_effects    = 7;
        SaveStateResponse       save_state      = 8;
    }
}

message Notification {
    oneof notification_type {
        LightingState state_changed = 1;  // Pushed when state changes on-device
    }
}

// ============================================================================
//  Data models
// ============================================================================

// Full snapshot of the RGB underglow state.  Returned by get_state and pushed
// via the state_changed notification whenever something changes on-device
// (e.g. the user pressed a physical RGB key).
message LightingState {
    bool   on             = 1;  // true = enabled
    uint32 active_effect  = 2;  // index into the effect list
    uint32 hue            = 3;  // 0-360
    uint32 saturation     = 4;  // 0-100
    uint32 brightness     = 5;  // 0-100
    uint32 speed          = 6;  // 1-5, animation speed
}

// A list of effect names the firmware supports.
message EffectList {
    repeated string effects = 1;
}

// ============================================================================
//  Request types
// ============================================================================

message SetPowerRequest {
    bool on = 1;
}

message SetEffectRequest {
    uint32 effect_index = 1;
}

// Allows setting H, S, B independently.  Only fields that are set (non-zero
// or explicitly provided via `has_*` semantics) will be applied.
// Client should fill all three for a full color change.
message SetColorRequest {
    uint32 hue        = 1;  // 0-360
    uint32 saturation = 2;  // 0-100
    uint32 brightness = 3;  // 0-100
}

message SetSpeedRequest {
    uint32 speed = 1;  // 1-5
}

message SetBrightness {
    uint32 brightness = 1;  // 0-100
}

// ============================================================================
//  Response types
// ============================================================================

enum SetPowerResponse {
    SET_POWER_RESP_OK    = 0;
    SET_POWER_RESP_ERROR = 1;
}

enum SetEffectResponse {
    SET_EFFECT_RESP_OK              = 0;
    SET_EFFECT_RESP_INVALID_INDEX   = 1;
    SET_EFFECT_RESP_ERROR           = 2;
}

enum SetColorResponse {
    SET_COLOR_RESP_OK    = 0;
    SET_COLOR_RESP_ERROR = 1;
}

enum SetSpeedResponse {
    SET_SPEED_RESP_OK    = 0;
    SET_SPEED_RESP_ERROR = 1;
}

enum SetBrightnessResponse {
    SET_BRIGHTNESS_RESP_OK    = 0;
    SET_BRIGHTNESS_RESP_ERROR = 1;
}

enum SaveStateResponse {
    SAVE_STATE_RESP_OK    = 0;
    SAVE_STATE_RESP_ERROR = 1;
}
