syntax = "proto3";

package zmk.lighting;

import "keymap.proto";

message Request {
    oneof request_type {
        bool get_underglow_info = 1;
        bool get_underglow_state = 2;
        SetUnderglowStateRequest set_underglow_state = 3;
        bool get_rgb_map = 4;
        SetRgbMapBindingRequest set_rgb_map_binding = 5;
        bool check_unsaved_changes = 6;
        bool save_changes = 7;
        bool discard_changes = 8;
    }
}

message Response {
    oneof response_type {
        UnderglowInfo get_underglow_info = 1;
        UnderglowState get_underglow_state = 2;
        SetUnderglowStateResponse set_underglow_state = 3;
        RgbMap get_rgb_map = 4;
        SetRgbMapBindingResponse set_rgb_map_binding = 5;
        bool check_unsaved_changes = 6;
        SaveChangesResponse save_changes = 7;
        bool discard_changes = 8;
    }
}

message Notification {
    oneof notification_type {
        bool unsaved_changes_status_changed = 1;
        UnderglowState underglow_state_changed = 2;
        UnderglowColorChanged underglow_color_changed = 3;
    }
}

message UnderglowInfo {
    uint32 led_count = 1;
    repeated sint32 pixel_lookup = 2;
    repeated RgbLayerInfo rgb_layers = 3;
    bool rgb_map_editable = 4;
}

message RgbLayerInfo {
    uint32 layer_id = 1;
    uint32 fade_delay = 2;
}

message UnderglowState {
    bool on = 1;
    uint32 effect = 2;
    uint32 speed = 3;
    uint32 hue = 4;
    uint32 sat = 5;
    uint32 brt = 6;
}

message SetUnderglowStateRequest {
    bool has_on = 1;
    bool on = 2;

    bool has_effect = 3;
    uint32 effect = 4;

    bool has_speed = 5;
    uint32 speed = 6;

    bool has_color = 7;
    uint32 hue = 8;
    uint32 sat = 9;
    uint32 brt = 10;
}

enum SetUnderglowStateResponse {
    SET_UNDERGLOW_STATE_RESP_OK = 0;
    SET_UNDERGLOW_STATE_RESP_INVALID_VALUE = 1;
    SET_UNDERGLOW_STATE_RESP_NOT_SUPPORTED = 2;
}

message RgbMap {
    repeated RgbLayer layers = 1;
}

message RgbLayer {
    uint32 layer_id = 1;
    uint32 fade_delay = 2;
    repeated zmk.keymap.BehaviorBinding bindings = 3;
}

message SetRgbMapBindingRequest {
    uint32 layer_id = 1;
    int32 key_position = 2;
    zmk.keymap.BehaviorBinding binding = 3;
}

enum SetRgbMapBindingResponse {
    SET_RGB_MAP_BINDING_RESP_OK = 0;
    SET_RGB_MAP_BINDING_RESP_INVALID_LOCATION = 1;
    SET_RGB_MAP_BINDING_RESP_INVALID_BEHAVIOR = 2;
    SET_RGB_MAP_BINDING_RESP_INVALID_PARAMETERS = 3;
    SET_RGB_MAP_BINDING_RESP_NOT_SUPPORTED = 4;
    SET_RGB_MAP_BINDING_RESP_INVALID_LAYER = 5;
}

message SaveChangesResponse {
    oneof result {
        bool ok = 1;
        SaveChangesErrorCode err = 2;
    }
}

enum SaveChangesErrorCode {
    SAVE_CHANGES_ERR_OK = 0;
    SAVE_CHANGES_ERR_GENERIC = 1;
    SAVE_CHANGES_ERR_NOT_SUPPORTED = 2;
    SAVE_CHANGES_ERR_NO_SPACE = 3;
}

message UnderglowColorChanged {
    uint32 layers = 1;
    bool wakeup = 2;
}
